name: Auto Bump & Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  bump:
    # Skip when this workflow itself pushes the bump commit
    if: "!startsWith(github.event.head_commit.message, 'chore: bump')"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version and push tag
        run: |
          current=$(jq -r .version package.json)
          IFS='.' read -r major minor patch <<< "$current"
          new="$major.$minor.$((patch + 1))"
          jq ".version = \"$new\"" package.json > tmp.json && mv tmp.json package.json
          git commit -am "chore: bump v$new"
          git tag "v$new"
          git push origin main
          git push origin "v$new"

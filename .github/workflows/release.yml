name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    name: Create release
    runs-on: ubuntu-latest
    steps:
      - uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: bun-darwin-arm64
            os: macos-latest
            asset_name: tailport-darwin-arm64
          - target: bun-darwin-x64
            os: macos-latest
            asset_name: tailport-darwin-x64
          - target: bun-linux-x64
            os: ubuntu-latest
            asset_name: tailport-linux-x64
          - target: bun-linux-arm64
            os: ubuntu-latest
            asset_name: tailport-linux-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary
        run: bun build cli/index.ts --compile --target=${{ matrix.target }} --outfile ${{ matrix.asset_name }}

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

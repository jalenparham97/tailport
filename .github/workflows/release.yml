name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binaries
        run: |
          bun build cli/index.ts --compile --target=bun-darwin-arm64  --outfile tailport-darwin-arm64
          bun build cli/index.ts --compile --target=bun-darwin-x64    --outfile tailport-darwin-x64
          bun build cli/index.ts --compile --target=bun-linux-x64     --outfile tailport-linux-x64
          bun build cli/index.ts --compile --target=bun-linux-arm64   --outfile tailport-linux-arm64

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            tailport-darwin-arm64
            tailport-darwin-x64
            tailport-linux-x64
            tailport-linux-arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
